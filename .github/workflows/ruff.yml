name: Ruff

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Ruff Lint
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "latest"
          args: "check"

      - name: Check Ruff Formatting
        run: ruff format --check --diff .
